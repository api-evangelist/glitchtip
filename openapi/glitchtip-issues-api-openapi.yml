          nullable: true
          additionalProperties: true
          type: object
        fragment:
          title: Fragment
          nullable: true
          type: string
        method:
          title: Method
          nullable: true
          type: string
        protocol:
          title: Protocol
          nullable: true
          type: string
        url:
          title: Url
          nullable: true
