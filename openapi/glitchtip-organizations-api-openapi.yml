          enum:
          - 1d
          - 1h
          - 1m
          type: string
        required: false
      - in: query
        name: project
        schema:
          title: Project
          nullable: true
          items:
            minimum: -1
            type: integer
          type: array
        required: false
      - in: query
        name: field
        schema:
          enum:
          - sum(quantity)
          - sum(times_seen)
          title: Field
          type: string
        required: true
      - in: query
        name: start
        schema:
          format: date-time
          title: Start
          type: string
        required: true
      - in: query
        name: end
        schema:
          format: date-time
          title: End
          type: string
        required: true
      responses:
        '200':
          description: OK
      description: 'Reverse engineered stats v2 endpoint. Endpoint in sentry not documented.

        Appears similar to documented sessions endpoint.

        Used by the Sentry Grafana integration.


        Used to return time series statistics.

        Submit query params start, end, and interval (defaults to 1h)

        Limits results to 1000 intervals. For example if using hours, max days would be 41'
